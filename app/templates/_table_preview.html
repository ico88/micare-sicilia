<div class="table-responsive preview-table">
  <table class="table table-sm table-striped">
    <thead>
      <tr>
        {% if rows %}
          {% for key in rows[0].keys() %}
            <th>{{ key }}</th>
          {% endfor %}
        {% endif %}
      </tr>
    </thead>
    <tbody>
      {% for row in rows %}
        <tr>
          {% for value in row.values() %}
            <td>{{ value }}</td>
          {% endfor %}
        </tr>
      {% else %}
        <tr><td class="text-muted">Nessun dato disponibile.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
