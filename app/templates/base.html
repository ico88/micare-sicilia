<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}MIC RES Sicilia{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg border-bottom bg-white">
      <div class="container-fluid">
        <a class="navbar-brand fw-semibold" href="{{ url_for('dashboard.dashboard') }}">mic-res-sicilia</a>
        <div class="navbar-nav">
          <a class="nav-link" href="{{ url_for('upload.upload') }}">Upload</a>
          <a class="nav-link" href="{{ url_for('dashboard.dashboard') }}">Dashboard</a>
        </div>
      </div>
    </nav>

    <main class="container-fluid py-4">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="mb-3">
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} mb-2">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
